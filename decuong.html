<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đề Cương</title>
    <style>
        *{
            
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-decoration: none;
        }
        .content1 , .content2{
            display: inline-block;
            margin: 30px;
        }
        input {
          position: absolute;
          opacity: 0;
          z-index: -1;
        }
        .accordion {
          margin: 10px;
          border-radius: 5px;
          overflow: hidden;
          box-shadow: 0 4px 4px -2px rgba(0, 0, 0, 0.5);
        }
        .accordion-label {
          display: flex;
          justify-content: space-between;
          padding: 1em;
          font-weight: bold;
          cursor: pointer;
          background: #333;
          color: #fff;
        }
        .accordion-content {
          max-height: 0;
          padding: 0 1em;
          background: white;
          transition: all 0.30s;
        }
        input:checked ~ .accordion-content {
          max-height: 100vh;
          padding: 1em;
        }
    </style>
</head>
<body>
    <div class="accordion">
        <input type="checkbox" id="tab1" />
        <label class="accordion-label" for="tab1">Lớp 6</label>
        <div class="accordion-content">
          <div class="content1">
            <h4>Đề Cương</h4>
            <nav>
                <a href="">Giữa Học Kỳ I</a>
                <br>
                <br>
                <a href="">Học Kỳ I</a>
                <br>
                <br>
                <a href="">Giữa Học Kỳ II</a>
                <br>
                <br>
                <a href="">Học Kỳ II</a>
            </nav>
          </div>
          <div class="content2">
            <h4>Đề Thi</h4>
            <nav>
              <a href="">Giữa Học Kỳ I</a>
              <br>
              <br>
              <a href="">Học Kỳ I</a>
              <br>
              <br>
              <a href="">Giữa Học Kỳ II</a>
              <br>
              <br>
              <a href="">Học Kỳ II</a>
            </nav>
          </div>
        </div>
    </div>

</body>
</html>
